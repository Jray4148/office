<div class="flex justify-between">
  <h5 class="text-2xl font-bold">{{contactName}}</h5>
  <div class="flex gap-3">
    <p-dropdown styleClass="w-72" placeholder="Select Template" />
    <p-button label="Generate Follow-Up" rounded="true" (click)="onGenerateFollowUp()" />
  </div>
</div>
<p-divider />
<div class="grid grid-cols-1 gap-4" [formGroup]="emailForm">
  <input class="mt-4" formControlName="subject" type="text" pInputText placeholder="Email Subject" />
  <textarea rows="10" formControlName="body" pInputTextarea placeholder="Email Body"></textarea>
</div>
<div class="flex justify-end gap-3 pt-4">
  <p-button label="Cancel" rounded="true" severity="secondary" />
  <p-button label="Send" rounded="true" (click)="onSendEmail()" />
</div>
