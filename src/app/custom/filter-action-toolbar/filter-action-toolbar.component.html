<h5 class="text-2xl font-bold mb-2">{{ title }}</h5>
<div class="flex items-center justify-between">
  <div>
  <p-iconfield iconPosition="left" class="ml-auto">
    <p-inputicon>
      <i class="pi pi-search"></i>
    </p-inputicon>
    <input pInputText type="text" (input)="searchValue($event)"  placeholder="Search keyword" />
  </p-iconfield>
  </div>
  <div class="flex gap-3">
    <p-button
      [label]="previewTitle"
      [raised]="true"
      [rounded]="true"
      icon="pi pi-plus"
      (onClick)="previewClick()"
      [disabled]="disable"
      [loading]="loading"
    />
  </div>
</div>
<p-divider></p-divider>
